services:
  # ============================================
  # TG Downloader (Bot + Web 管理界面)
  # 单容器运行，无需额外的 qBittorrent 容器
  # ============================================
  tg-downloader:
    build: ./core
    container_name: tg-downloader
    restart: unless-stopped
    ports:
      - "8081:8081"                     # Web 管理界面
    volumes:
      - ./downloads:/downloads          # 下载文件持久化
      - ./core/sessions:/app/sessions   # Telethon 会话持久化
      - ./core/logs:/app/logs           # 日志持久化
      - ./core/settings:/app/settings   # 配置持久化（Web 界面可修改）
    tty: true                           # 首次登录需要交互式终端
    stdin_open: true                    # 首次登录需要标准输入
